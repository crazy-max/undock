name: e2e

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  push:
    branches:
      - 'main'
    tags:
      - 'v*'
  pull_request:

env:
  DESTDIR: ./bin

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      -
        name: Build
        uses: docker/bake-action@82490499d2e5613fcead7e128237ef0b0ea210f7 # v7.0.0
        with:
          targets: binary
          set: |
            *.platform=${{ matrix.platform }}
      -
        name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: undock-${{ env.PLATFORM_PAIR }}
          path: ${{ env.DESTDIR }}
          if-no-files-found: error

  registry:
    runs-on: ubuntu-latest
    needs:
      - build
    strategy:
      fail-fast: false
      matrix:
        include:
          -
            image: "dockereng/packaging:buildx-v0.11.1"
            all: "true"
            loglevel: "debug"
          -
            image: "dockereng/packaging:buildx-v0.11.1"
            all: "true"
            wrap: "true"
            loglevel: "debug"
          -
            image: "crazymax/diun:4.20.1"
            all: "true"
            include: "/usr/local/bin"
            loglevel: "info"
          -
            image: "crazymax/diun:latest@sha256:3fca3dd86c2710586208b0f92d1ec4ce25382f4cad4ae76a2275db8e8bb24031"
            include: "/usr/local/bin"
            loglevel: "debug"
    steps:
      -
        name: Download binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ env.DESTDIR }}
          pattern: undock-linux-amd64
      -
        name: Fix perms and check
        run: |
          chmod +x ${DESTDIR}/build/undock
          ${DESTDIR}/build/undock --version
      -
        name: Run
        run: |
          flags="--rm-dist"
          if [ -n "${{ matrix.loglevel }}" ]; then
            flags="${flags} --log-level ${{ matrix.loglevel }}"
          fi
          if [ "${{ matrix.all }}" = "true" ]; then
            flags="${flags} --all"
          fi
          if [ "${{ matrix.wrap }}" = "true" ]; then
            flags="${flags} --wrap"
          fi
          if [ -n "${{ matrix.include }}" ]; then
            flags="${flags} --include ${{ matrix.include }}"
          fi
          set -x
          ${DESTDIR}/build/undock ${flags} ${{ matrix.image }} ./dist
      -
        name: Dist content
        run: |
          tree -nh ./dist

  cache:
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Download binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ env.DESTDIR }}
          pattern: undock-linux-amd64
      -
        name: Fix perms and check
        run: |
          chmod +x ${DESTDIR}/build/undock
          ${DESTDIR}/build/undock --version
      -
        name: Run
        run: |
          ${DESTDIR}/build/undock --log-level debug --rm-dist --all crazymax/buildx-pkg:latest ./dist
      -
        name: Dist content
        run: |
          tree -nh ./dist
      -
        name: Re Run
        run: |
          rm -rf ./dist2
          ${DESTDIR}/build/undock --log-level debug --rm-dist --all crazymax/buildx-pkg:latest ./dist2
      -
        name: Dist content
        run: |
          tree -nh ./dist2

  docker-daemon:
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      -
        name: Download binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ env.DESTDIR }}
          pattern: undock-linux-amd64
      -
        name: Fix perms and check
        run: |
          chmod +x ${DESTDIR}/build/undock
          ${DESTDIR}/build/undock --version
      -
        name: Create Dockerfile
        run: |
          mkdir ./bin/test
          cat > ./bin/test/Dockerfile <<EOL
          FROM alpine
          RUN mkdir hello && echo "Hello, world!" > /hello/world
          EOL
      -
        name: Build image and load
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ./bin/test
          load: true
          tags: image:local
      -
        name: Run
        run: |
          ${DESTDIR}/build/undock --rm-dist --include /hello docker-daemon://image:local ./dist
      -
        name: Dist content
        run: |
          tree -nh ./dist

  docker-archive:
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      -
        name: Download binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ env.DESTDIR }}
          pattern: undock-linux-amd64
      -
        name: Fix perms and check
        run: |
          chmod +x ${DESTDIR}/build/undock
          ${DESTDIR}/build/undock --version
      -
        name: Create docker archive
        run: |
          docker pull dockereng/packaging:buildx-v0.11.1
          docker save dockereng/packaging:buildx-v0.11.1 > archive.tar
      -
        name: Run
        run: |
          ${DESTDIR}/build/undock --rm-dist docker-archive://archive.tar ./dist
      -
        name: Dist content
        run: |
          tree -nh ./dist
